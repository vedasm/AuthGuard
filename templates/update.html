{% extends "base.html" %}

{% block title %}Edit Credential - AuthGuard{% endblock %}

{% block main %}
    <div class="container" style="max-width: 900px;">
        <h2>Edit Credential</h2>

        <form method="POST" style="max-width: 900px; margin: 0 auto;">
            <div class="mb-3">
                <label class="form-label-center">Website</label>
                <input
                    type="text"
                    class="form-control"
                    value="{{ cred['website'] }}"
                    disabled
                >
            </div>

            <div class="mb-3">
                <label for="username" class="form-label-center">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    value="{{ cred['username'] }}"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="password" class="form-label-center">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    value="{{ cred['password_encrypted'] }}"
                    required
                >
            </div>

            <button class="btn btn-primary" type="submit">Update Credential</button>
        </form>

        <p class="mt-3"><a href="{{ url_for('vault') }}">Back to Vault</a></p>
    </div>
{% endblock %}
