{% extends "base.html" %}

{% block title %}
    Forgot Password - AuthGuard
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 420px;">
        <h2>Forgot Password?</h2>
        <p class="mb-3">Enter your email and we'll send you a reset link.</p>

        <form action="/forgot" method="post">
            <div class="mb-3">
                <input
                    autocomplete="off"
                    autofocus
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="Email Address"
                    type="email"
                    required
                >
            </div>
            <button class="btn btn-primary w-100" type="submit">Send Reset Link</button>
        </form>

        <p class="mt-3"><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
{% endblock %}
