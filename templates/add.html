{% extends "base.html" %}

{% block title %}
    Add Credential - AuthGuard
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 900px;">
        <h2>Add New Credential</h2>

        <form method="POST" style="max-width: 900px; margin: 0 auto;">
            <div class="mb-3">
                <label for="website" class="form-label-center">Website</label>
                <input
                    type="text"
                    class="form-control"
                    id="website"
                    name="website"
                    placeholder="e.g., gmail.com"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="username" class="form-label-center">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Your username or email"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="password" class="form-label-center">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <button class="btn btn-primary" type="submit">Add Credential</button>
        </form>

        <p class="mt-3"><a href="/">Back to Vault</a></p>
    </div>
{% endblock %}
