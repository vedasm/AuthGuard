{% extends "base.html" %}

{% block title %}Account - AuthGuard{% endblock %}

{% block main %}
    <div class="container" style="max-width: 450px;">
        <h2>Account Settings</h2>

        <h3>Email</h3>
        <form method="POST" class="mb-4">
            <div class="mb-3">
                <input type="email" class="form-control" value="{{ g.user['email'] }}" readonly>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" id="new_email" name="new_email" placeholder="New Email" required>
            </div>
            <button type="submit" name="change_email" class="btn btn-primary w-100">Update Email</button>
        </form>

        <h3>Change Password</h3>
        <form method="POST" class="mb-4">
            <div class="mb-3">
                <input type="password" class="form-control" id="prev_password" name="prev_password" placeholder="Current Password" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="new_password" name="new_password" placeholder="New Password" required>
            </div>
            <button type="submit" name="change_password" class="btn btn-primary w-100">Update Password</button>
        </form>

        <h3>Danger Zone</h3>
        <p class="mb-3">Deleting your account is permanent and cannot be undone.</p>
        <form method="POST" onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.');">
            <button type="submit" name="delete_account" class="btn btn-primary w-100">Delete Account</button>
        </form>

        <p class="mt-3"><a href="/">Back to Vault</a></p>
    </div>
{% endblock %}
